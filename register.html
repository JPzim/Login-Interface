<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="/assets/styles/style.css" rel="stylesheet">
    <title>Registro</title>
</head>
<body class="d-flex align-items-center py-4 bg-body-tertiary">
    <main class="w-100 m-auto form-container">
        <form>
            <h1 class="h2 mb-2 fw-light">Olá, seja bem vindo!</h1>
            <p class="text-body-tertiary mb-4">Se registre no nosso sistema :)</p>
            <h1 class="h3 mb-3 fw-normal">Registro</h1>
            <div class="form-floating mt-xl-2">
                <input type="text" class="form-control" id="floatingInput" placeholder="Digíte seu nome:">
                <label for="floatingInput">Nome</label>
            </div>
            <div class="form-floating mt-2">
                <input type="date" class="form-control" id="floatingInput" placeholder="Digíte seu nome:">
                <label for="floatingInput">Data de Nascimento</label>
            </div>
            <div class="form-floating mt-2">
                <input type="email" class="form-control" id="floatingInput" placeholder="Digíte seu email:">
                <label for="floatingInput">Email</label>
            </div>
            <div class="form-floating mt-2">
                <input type="password" class="form-control" id="floatingInput" placeholder="Digíte sua senha:">
                <label for="floatingInput">Senha</label>
            </div>
            <div class="form-floating mt-2 mb-3">
                <input type="password" class="form-control" id="floatingInput" placeholder="Digíte sua senha:">
                <label for="floatingInput">Confirmar Senha</label>
            </div>
            <button class="btn btn-primary w-100 py-2 btn-lg">Registrar</button>
            <p class="text-body-tertiary mt-3 mb-3">&copy; 2026</p>
        </form>
    </main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
