<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="/assets/styles/style.css" rel="stylesheet">
    <title>Login</title>
</head>
<body class="d-flex align-items-center py-4 bg-body-tertiary">
    <main class="w-100 m-auto form-container">
        <form>
            <h1 class="h2 mb-2 fw-light">Olá, seja bem vindo!</h1>
            <p class="text-body-tertiary mb-4">Já tem login? Insira as credencias abaixo :)</p>
            <h1 class="h3 mb-3 fw-normal">Login</h1>
            <div class="form-floating">
                <input type="email" class="form-control" id="floatingInput" placeholder="Digíte seu email:">
                <label for="floatingInput">Email</label>
            </div>
            <div class="form-floating mt-2">
                <input type="password" class="form-control" id="floatingInput" placeholder="Digíte sua senha:">
                <label for="floatingInput">Senha</label>
            </div>
            <div class="d-flex justify-content-between align-items-center my-3">
                <div class="form-check text-start">
                    <input type="checkbox" class="form-check-input" id="flexCheckDefault">
                    <label class="form-check-label user-select-none cursor" for="flexCheckDefault">Lembrar-me</label>
                </div>
                <a class="link-underline link-underline-opacity-0" href="resetsenha.html">Esqueceu sua senha?</a>
            </div>
            <button class="btn btn-primary w-100 py-2 btn-lg">Entrar</button>
            <div class="d-flex justify-content-center align-items-center my-3">
                <label>Não tem uma conta?<a class="link-underline link-underline-opacity-0" href="register.html"> Registre-se</a></label>
            </div>
            <p class="text-body-tertiary mt-3 mb-3">&copy; 2026</p>
        </form>
    </main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>   
</body>
</html>
